<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tender Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(120,100,255,0.12);
  --text: #e8e8f0;
  --muted: #666680;
  --sub: #9999bb;
  --accent: #7c6bff;
  --accent2: #a78bfa;
  --glow: rgba(124,107,255,0.25);
  --green: #22d3a0;
  --green-bg: rgba(34,211,160,0.08);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.08);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 20px;
  transition: opacity 0.4s ease;
}
#loader.gone { opacity: 0; pointer-events: none; }
.loader-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px; letter-spacing: 6px;
  color: var(--accent);
  text-shadow: 0 0 60px var(--glow);
}
.loader-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; }
.loader-bar { width: 140px; height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.loader-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; animation: fill 1.6s ease-in-out infinite; }
@keyframes fill { 0%{width:0;margin-left:0} 50%{width:70%;margin-left:15%} 100%{width:0;margin-left:100%} }

/* HEADER */
.header {
  padding: 20px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  background: rgba(8,8,16,0.95);
  backdrop-filter: blur(12px);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; box-shadow: 0 0 20px var(--glow);
}
.logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--text); }
.refresh-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--accent); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.refresh-btn:active { transform: scale(0.9); background: var(--accent); color: white; }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATS */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; padding: 14px 16px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 10px; text-align: center;
}
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }

/* FILTERS */
.filters {
  display: flex; gap: 8px;
  padding: 0 16px 12px; overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--sub); font-size: 12px; font-family: 'Space Grotesk', sans-serif;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-btn.active {
  background: var(--accent); border-color: var(--accent);
  color: white; box-shadow: 0 0 16px var(--glow);
}

/* CARDS */
.cards { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  transition: transform 0.15s, border-color 0.2s;
  animation: fadeUp 0.3s ease both;
}
.card:active { transform: scale(0.98); }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); flex: 1; }
.match-badge {
  flex-shrink: 0; padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700; font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
}
.match-high { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,211,160,0.2); }
.match-mid { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
.match-low { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

.card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.meta-tag {
  font-size: 11px; color: var(--sub);
  background: var(--surface2); border-radius: 6px;
  padding: 3px 8px; display: flex; align-items: center; gap: 4px;
}

.card-reasoning {
  font-size: 11px; color: var(--sub); line-height: 1.5;
  border-left: 2px solid var(--accent); padding-left: 8px;
  margin-bottom: 10px;
}

.card-bottom { display: flex; align-items: center; justify-content: space-between; }
.rec-tag {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 6px;
}
.rec-submit { background: var(--green-bg); color: var(--green); }
.rec-consider { background: var(--yellow-bg); color: var(--yellow); }
.rec-skip { background: var(--red-bg); color: var(--red); }

.source-link {
  font-size: 11px; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  opacity: 0.8;
}
.source-link:hover { opacity: 1; }

/* EMPTY */
.empty {
  text-align: center; padding: 60px 20px;
  display: none; flex-direction: column; align-items: center; gap: 12px;
}
.empty.show { display: flex; }
.empty-icon { font-size: 48px; opacity: 0.3; }
.empty-text { color: var(--muted); font-size: 14px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 20px;
  font-size: 13px; z-index: 99; transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.section-label {
  padding: 4px 16px 8px;
  font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">TENDER AGENT</div>
  <div class="loader-sub">ЗАГРУЗКА ДАННЫХ</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">TENDER AGENT</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="refreshTenders()" title="Обновить">↻</button>
</div>

<div class="stats" id="statsBlock">
  <div class="stat-card">
    <div class="stat-num" id="statTotal">—</div>
    <div class="stat-label">ВСЕГО</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statHigh">—</div>
    <div class="stat-label">ВЫСОКИЙ</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statSubmit">—</div>
    <div class="stat-label">К ПОДАЧЕ</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
  <button class="filter-btn" onclick="setFilter('high', this)">Высокий match</button>
  <button class="filter-btn" onclick="setFilter('submit', this)">Подать заявку</button>
  <button class="filter-btn" onclick="setFilter('consider', this)">Рассмотреть</button>
</div>

<div class="section-label" id="sectionLabel">Последние результаты</div>
<div class="cards" id="cardsContainer"></div>
<div class="empty" id="emptyState">
  <div class="empty-icon">🔍</div>
  <div class="empty-text">Тендеров не найдено.<br>Нажми ↻ для поиска.</div>
</div>

<div class="toast" id="toast"></div>

<script>
const GET_URL = 'https://solura.app.n8n.cloud/webhook/get-tenders';
const REFRESH_URL = 'https://solura.app.n8n.cloud/webhook/tender-refresh';

let allTenders = [];
let currentFilter = 'all';

// Init Telegram
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function getMatchClass(pct) {
  if (pct >= 70) return 'match-high';
  if (pct >= 40) return 'match-mid';
  return 'match-low';
}

function getRecClass(rec) {
  if (!rec) return 'rec-skip';
  if (rec.includes('Подать')) return 'rec-submit';
  if (rec.includes('Рассмотреть')) return 'rec-consider';
  return 'rec-skip';
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('sectionLabel');

  let filtered = allTenders;
  if (currentFilter === 'high') filtered = allTenders.filter(t => (t.matchPercent || 0) >= 70);
  if (currentFilter === 'submit') filtered = allTenders.filter(t => t.recommendation?.includes('Подать'));
  if (currentFilter === 'consider') filtered = allTenders.filter(t => t.recommendation?.includes('Рассмотреть'));

  // Sort by match %
  filtered.sort((a, b) => (b.matchPercent || 0) - (a.matchPercent || 0));

  label.textContent = `${filtered.length} тендер${filtered.length === 1 ? '' : filtered.length < 5 ? 'а' : 'ов'}`;

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  container.innerHTML = filtered.map((t, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s">
      <div class="card-top">
        <div class="card-title">${t.title || 'Без названия'}</div>
        <div class="match-badge ${getMatchClass(t.matchPercent || 0)}">${t.matchPercent || 0}%</div>
      </div>
      <div class="card-meta">
        ${t.organization ? `<span class="meta-tag">🏢 ${t.organization}</span>` : ''}
        ${t.budget ? `<span class="meta-tag">💰 ${t.budget}</span>` : ''}
        ${t.deadline ? `<span class="meta-tag">📅 ${t.deadline}</span>` : ''}
      </div>
      ${t.reasoning ? `<div class="card-reasoning">${t.reasoning}</div>` : ''}
      <div class="card-bottom">
        <span class="rec-tag ${getRecClass(t.recommendation)}">${t.recommendation || 'Пропустить'}</span>
        ${t.source ? `<a class="source-link" href="${t.source}" target="_blank">Открыть →</a>` : ''}
      </div>
    </div>
  `).join('');
}

function updateStats(tenders) {
  document.getElementById('statTotal').textContent = tenders.length;
  document.getElementById('statHigh').textContent = tenders.filter(t => (t.matchPercent || 0) >= 70).length;
  document.getElementById('statSubmit').textContent = tenders.filter(t => t.recommendation?.includes('Подать')).length;
}

async function loadTenders() {
  try {
    const res = await fetch(GET_URL);
    const data = await res.json();
    const tenders = data.tenders || data || [];
    allTenders = Array.isArray(tenders) ? tenders : [];
    updateStats(allTenders);
    renderCards();
  } catch(e) {
    showToast('Ошибка загрузки данных');
    document.getElementById('emptyState').classList.add('show');
  } finally {
    setTimeout(() => document.getElementById('loader').classList.add('gone'), 400);
  }
}

async function refreshTenders() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showToast('🔍 Ищем новые тендеры...', 8000);
  try {
    const res = await fetch(REFRESH_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await res.json();
    const tenders = data.tenders || [];
    if (tenders.length > 0) {
      allTenders = tenders;
      updateStats(allTenders);
      renderCards();
      showToast(`✅ Найдено ${tenders.length} тендеров`);
    } else {
      showToast('Новых тендеров не найдено');
    }
  } catch(e) {
    showToast('Ошибка при обновлении');
  } finally {
    btn.classList.remove('spinning');
  }
}

// Start
loadTenders();
</script>
</body>
</html>
