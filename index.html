<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tender Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --text-muted: #5a5a72;
    --text-sub: #8888aa;
    --accent: #7c6bff;
    --accent-glow: rgba(124, 107, 255, 0.3);
    --green: #00e676;
    --green-dim: rgba(0, 230, 118, 0.1);
    --yellow: #ffd740;
    --yellow-dim: rgba(255, 215, 64, 0.1);
    --orange: #ff9100;
    --orange-dim: rgba(255, 145, 0, 0.1);
    --red: #ff5252;
    --red-dim: rgba(255, 82, 82, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LOADER */
  .loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s ease;
    gap: 16px;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow);
  }
  .loader-bar {
    width: 120px; height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-progress {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    animation: loading 1.5s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .header-badge {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .refresh-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-sub);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* TENDER LIST */
  .tender-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 40px;
  }

  .tender-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    animation: slideIn 0.4s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .tender-card:active { transform: scale(0.98); }

  .tender-card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .tender-match {
    flex-shrink: 0;
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    line-height: 1;
    flex-direction: column;
    gap: 0;
  }
  .tender-match span {
    font-size: 9px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0.8;
  }
  .match-high { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .match-mid { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,215,64,0.2); }
  .match-low { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(255,145,0,0.2); }

  .tender-title-block { flex: 1; }
  .tender-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 4px;
  }
  .tender-org {
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 500;
  }

  .tender-card-body {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tender-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-sub);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tender-reasoning {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.5;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 2px solid var(--accent);
  }
  .tender-card-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rec-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .rec-apply { background: var(--green-dim); color: var(--green); }
  .rec-consider { background: var(--yellow-dim); color: var(--yellow); }
  .rec-skip { background: var(--red-dim); color: var(--red); }

  .link-btn {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .empty-sub { font-size: 13px; color: var(--text-sub); }

  /* ERROR STATE */
  .error-banner {
    margin: 16px 20px 0;
    padding: 12px 16px;
    background: var(--red-dim);
    border: 1px solid rgba(255,82,82,0.2);
    border-radius: 12px;
    font-size: 12px;
    color: var(--red);
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error-banner.visible { display: flex; }

  /* LAST UPDATED */
  .last-updated {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 8px;
  }
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-logo">TENDER AGENT</div>
  <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">TENDER AGENT</div>
    <div class="header-badge">AI</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadTenders(true)">↻</button>
</div>

<!-- ERROR BANNER -->
<div class="error-banner" id="errorBanner">
  ⚠️ <span id="errorText">Ошибка загрузки данных</span>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item">
    <div class="stat-value" id="statTotal" style="color: var(--accent)">0</div>
    <div class="stat-label">Всего</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statHigh" style="color: var(--green)">0</div>
    <div class="stat-label">Высокий</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statApply" style="color: var(--yellow)">0</div>
    <div class="stat-label">Подать</div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters" id="filtersBar" style="display:none">
  <button class="filter-btn active" onclick="filterTenders('all', this)">Все</button>
  <button class="filter-btn" onclick="filterTenders('high', this)">🟢 Высокий</button>
  <button class="filter-btn" onclick="filterTenders('mid', this)">🟡 Средний</button>
  <button class="filter-btn" onclick="filterTenders('apply', this)">✅ Подать заявку</button>
  <button class="filter-btn" onclick="filterTenders('consider', this)">👀 Рассмотреть</button>
</div>

<!-- LAST UPDATED -->
<div class="last-updated" id="lastUpdated" style="display:none"></div>

<!-- TENDER LIST -->
<div class="tender-list" id="tenderList"></div>

<!-- EMPTY STATE -->
<div class="empty-state" id="emptyState">
  <div class="empty-icon">🔍</div>
  <div class="empty-title">Тендеры не найдены</div>
  <div class="empty-sub">Попробуй изменить фильтр или обновить данные</div>
</div>

<script>
  // Config — REPLACE WITH YOUR WEBHOOK URLs
  const GET_TENDERS_URL = 'https://rizobot.app.n8n.cloud/webhook/tender-list';
  const REFRESH_URL = 'REPLACE_WITH_WORKFLOW2_URL';

  // Init Telegram
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0a0a0f');
    tg.setBackgroundColor('#0a0a0f');
  }

  let allTenders = [];
  let currentFilter = 'all';

  // Load tenders from n8n
  async function loadTenders(isRefresh = false) {
    const refreshBtn = document.getElementById('refreshBtn');
    const loader = document.getElementById('loader');
    const errorBanner = document.getElementById('errorBanner');

    refreshBtn.classList.add('spinning');
    errorBanner.classList.remove('visible');

    if (!isRefresh) loader.classList.remove('hidden');

    // Use refresh URL if manual refresh, otherwise get list
    const url = isRefresh ? REFRESH_URL : GET_TENDERS_URL;
    const method = isRefresh ? 'POST' : 'GET';

    try {
      const response = await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        ...(isRefresh && { body: JSON.stringify({ source: 'miniapp' }) })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      // Handle both direct array and wrapped response
      if (data.tenders && Array.isArray(data.tenders)) {
        allTenders = data.tenders;
      } else if (Array.isArray(data)) {
        allTenders = data;
      } else {
        allTenders = [];
      }

      renderTenders(allTenders);
      updateStats(allTenders);
      showUI();

    } catch (err) {
      console.error('Error:', err);
      document.getElementById('errorText').textContent = 'Ошибка загрузки. Проверь соединение.';
      errorBanner.classList.add('visible');

      // Show mock data for demo
      allTenders = getMockData();
      renderTenders(allTenders);
      updateStats(allTenders);
      showUI();
    } finally {
      refreshBtn.classList.remove('spinning');
      setTimeout(() => loader.classList.add('hidden'), 500);
    }
  }

  function showUI() {
    document.getElementById('statsBar').style.display = 'grid';
    document.getElementById('filtersBar').style.display = 'flex';
    const lastUpdated = document.getElementById('lastUpdated');
    lastUpdated.style.display = 'block';
    lastUpdated.textContent = `Обновлено: ${new Date().toLocaleString('ru-RU')}`;
  }

  function updateStats(tenders) {
    document.getElementById('statTotal').textContent = tenders.length;
    document.getElementById('statHigh').textContent = tenders.filter(t => (t.matchPercent || t['Match %'] || 0) >= 80).length;
    document.getElementById('statApply').textContent = tenders.filter(t => t.recommendation === 'Подать заявку').length;
  }

  function filterTenders(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    let filtered = [...allTenders];
    if (filter === 'high') filtered = filtered.filter(t => getMatchPercent(t) >= 80);
    else if (filter === 'mid') filtered = filtered.filter(t => getMatchPercent(t) >= 60 && getMatchPercent(t) < 80);
    else if (filter === 'apply') filtered = filtered.filter(t => t.recommendation === 'Подать заявку');
    else if (filter === 'consider') filtered = filtered.filter(t => t.recommendation === 'Рассмотреть');

    renderTenders(filtered);
  }

  function getMatchPercent(t) {
    return t.matchPercent || t['Match %'] || 0;
  }

  function renderTenders(tenders) {
    const list = document.getElementById('tenderList');
    const emptyState = document.getElementById('emptyState');

    if (!tenders || tenders.length === 0) {
      list.innerHTML = '';
      emptyState.classList.add('visible');
      return;
    }

    emptyState.classList.remove('visible');
    list.innerHTML = tenders.map((t, i) => createCard(t, i)).join('');
  }

  function createCard(t, index) {
    const match = getMatchPercent(t);
    const title = t.title || t['Tender Title'] || 'Без названия';
    const org = t.organization || t['Organization'] || '';
    const budget = t.budget || t['Budget'] || 0;
    const deadline = t.deadline || t['Deadline'] || '';
    const reasoning = t.reasoning || t['Reasoning'] || '';
    const rec = t.recommendation || '';
    const link = t.link || t['Link'] || '';
    const source = t.source || t['Source'] || '';

    const matchClass = match >= 80 ? 'match-high' : match >= 60 ? 'match-mid' : 'match-low';
    const recClass = rec === 'Подать заявку' ? 'rec-apply' : rec === 'Рассмотреть' ? 'rec-consider' : 'rec-skip';
    const recText = rec || 'Рассмотреть';

    const budgetFormatted = budget > 0 ? `💰 ${Number(budget).toLocaleString('ru-RU')} UZS` : '';
    const deadlineFormatted = deadline ? `⏰ ${deadline}` : '';

    return `
    <div class="tender-card" style="animation-delay: ${index * 0.06}s">
      <div class="tender-card-header">
        <div class="tender-title-block">
          <div class="tender-title">${title}</div>
          <div class="tender-org">${org}</div>
        </div>
        <div class="tender-match ${matchClass}">
          ${match}<span>%</span>
        </div>
      </div>
      <div class="tender-card-body">
        <div class="tender-meta">
          ${budgetFormatted ? `<div class="meta-chip">${budgetFormatted}</div>` : ''}
          ${deadlineFormatted ? `<div class="meta-chip">${deadlineFormatted}</div>` : ''}
          ${source ? `<div class="meta-chip">📌 ${source}</div>` : ''}
        </div>
        ${reasoning ? `<div class="tender-reasoning">${reasoning}</div>` : ''}
      </div>
      <div class="tender-card-footer">
        <div class="rec-badge ${recClass}">${recText}</div>
        ${link ? `<a class="link-btn" href="${link}" target="_blank">Открыть →</a>` : ''}
      </div>
    </div>`;
  }

  // Mock data for demo when API fails
  function getMockData() {
    return [
      { title: 'Оказание юридических услуг по корпоративному праву', organization: 'АО "Узбекэнерго"', budget: 45000000, deadline: '2026-05-15', matchPercent: 92, reasoning: 'Точное совпадение — корпоративное право и юридический консалтинг входят в основные услуги фирмы.', recommendation: 'Подать заявку', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' },
      { title: 'Правовое сопровождение сделок M&A', organization: 'Министерство инвестиций РУз', budget: 120000000, deadline: '2026-05-20', matchPercent: 88, reasoning: 'M&A advisory — ключевая услуга фирмы, высокое соответствие требованиям.', recommendation: 'Подать заявку', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' },
      { title: 'Юридическая экспертиза договоров и контрактов', organization: 'ООО "Silk Road Group"', budget: 28000000, deadline: '2026-05-10', matchPercent: 85, reasoning: 'Составление и экспертиза договоров — прямое совпадение с профилем фирмы.', recommendation: 'Подать заявку', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' },
      { title: 'Комплаенс-аудит и due diligence', organization: 'АКБ "Капиталбанк"', budget: 75000000, deadline: '2026-05-30', matchPercent: 80, reasoning: 'Compliance и due diligence входят в перечень услуг фирмы.', recommendation: 'Подать заявку', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' },
      { title: 'Представление интересов в арбитраже', organization: 'ГУП "Узавтойул"', budget: 55000000, deadline: '2026-05-25', matchPercent: 75, reasoning: 'Разрешение споров соответствует профилю фирмы, но требует дополнительной специализации.', recommendation: 'Рассмотреть', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' },
      { title: 'Консультации по регуляторному праву', organization: 'Агентство по развитию рынка капитала', budget: 35000000, deadline: '2026-06-01', matchPercent: 68, reasoning: 'Частичное совпадение — регуляторный аспект юридического консалтинга.', recommendation: 'Рассмотреть', link: 'https://etender.uzex.uz', source: 'etender.uzex.uz' }
    ];
  }

  // Start
  loadTenders();
</script>
</body>
</html>
