<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tender Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #20202e;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #f0f0f8;
  --muted: #555568;
  --sub: #8888aa;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --glow: rgba(108,92,231,0.3);
  --green: #00cec9;
  --green-dim: rgba(0,206,201,0.1);
  --yellow: #fdcb6e;
  --yellow-dim: rgba(253,203,110,0.1);
  --red: #e17055;
  --red-dim: rgba(225,112,85,0.1);
  --blue: #74b9ff;
  --blue-dim: rgba(116,185,255,0.1);
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 24px;
  transition: opacity 0.5s ease;
}
#loader.gone { opacity: 0; pointer-events: none; }
.loader-icon { font-size: 40px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
.loader-title {
  font-size: 13px; letter-spacing: 6px; text-transform: uppercase;
  color: var(--sub); font-weight: 500;
}
.loader-bar { width: 120px; height: 1px; background: var(--surface3); }
.loader-fill { height: 100%; background: var(--accent2); animation: load 1.4s ease-in-out infinite; }
@keyframes load { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

/* HEADER */
.header {
  padding: 18px 16px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,15,0.97);
  backdrop-filter: blur(16px);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo-text { font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 1px; font-family: 'DM Mono', monospace; }
.header-right { display: flex; align-items: center; gap: 8px; }
.time-badge { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.refresh-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--accent2); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.refresh-btn:active { background: var(--accent); color: white; transform: scale(0.9); }
.refresh-btn.spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATS */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 6px; padding: 12px 16px 8px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 8px; text-align: center;
}
.stat-num { font-size: 22px; font-weight: 800; color: var(--accent2); line-height: 1; }
.stat-label { font-size: 8px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }

/* FILTERS */
.filters {
  display: flex; gap: 6px; padding: 8px 16px 10px;
  overflow-x: auto; scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--sub); font-size: 11px; font-family: 'Syne', sans-serif;
  font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* SECTION */
.section-info { padding: 4px 16px 10px; display: flex; align-items: center; justify-content: space-between; }
.section-count { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* CARDS */
.cards { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  animation: slideUp 0.35s ease both;
}
@keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }

/* Score bar at top */
.card-score-bar { height: 2px; }
.score-high { background: linear-gradient(90deg, var(--green), transparent); }
.score-mid  { background: linear-gradient(90deg, var(--yellow), transparent); }
.score-low  { background: linear-gradient(90deg, var(--red), transparent); }

.card-body { padding: 14px; }

/* Card header */
.card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.card-title-block { flex: 1; }
.card-title { font-size: 13px; font-weight: 700; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
.card-org { font-size: 11px; color: var(--sub); font-family: 'DM Mono', monospace; }

.score-badge {
  flex-shrink: 0; width: 52px; height: 52px; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid;
}
.score-badge.high { border-color: var(--green); background: var(--green-dim); }
.score-badge.mid  { border-color: var(--yellow); background: var(--yellow-dim); }
.score-badge.low  { border-color: var(--red); background: var(--red-dim); }
.score-num { font-size: 18px; font-weight: 800; line-height: 1; }
.score-num.high { color: var(--green); }
.score-num.mid  { color: var(--yellow); }
.score-num.low  { color: var(--red); }
.score-pct { font-size: 8px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* Meta tags */
.card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.meta-pill {
  font-size: 10px; color: var(--sub); font-family: 'DM Mono', monospace;
  background: var(--surface2); border-radius: 4px; padding: 3px 7px;
}

/* AI Analysis sections */
.ai-sections { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

.ai-section {
  border-radius: 8px; padding: 10px 11px;
  border-left: 2px solid;
}
.ai-section.why  { background: var(--green-dim); border-color: var(--green); }
.ai-section.risk { background: var(--yellow-dim); border-color: var(--yellow); }
.ai-section.plan { background: var(--blue-dim); border-color: var(--blue); }

.ai-section-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 5px; font-family: 'DM Mono', monospace;
}
.ai-section.why  .ai-section-label { color: var(--green); }
.ai-section.risk .ai-section-label { color: var(--yellow); }
.ai-section.plan .ai-section-label { color: var(--blue); }

.ai-section-text { font-size: 11px; line-height: 1.6; color: var(--sub); }

/* Criteria bars */
.criteria { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.criterion { background: var(--surface2); border-radius: 6px; padding: 7px 8px; }
.criterion-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.criterion-name { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.criterion-val { font-size: 10px; font-weight: 700; }
.criterion-track { height: 2px; background: var(--surface3); border-radius: 1px; overflow: hidden; }
.criterion-fill { height: 100%; border-radius: 1px; transition: width 0.6s ease; }

/* Footer */
.card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 5px; font-family: 'DM Mono', monospace; }
.badge-submit  { background: var(--green-dim); color: var(--green); }
.badge-consider{ background: var(--yellow-dim); color: var(--yellow); }
.badge-skip    { background: var(--red-dim); color: var(--red); }
.badge-risk-low  { background: var(--green-dim); color: var(--green); }
.badge-risk-mid  { background: var(--yellow-dim); color: var(--yellow); }
.badge-risk-high { background: var(--red-dim); color: var(--red); }
.badge-profit-high { background: var(--blue-dim); color: var(--blue); }
.badge-profit-mid  { background: var(--yellow-dim); color: var(--yellow); }
.badge-profit-low  { background: var(--surface2); color: var(--muted); }

.open-btn {
  font-size: 10px; color: var(--accent2); background: none; border: none;
  cursor: pointer; font-family: 'DM Mono', monospace; padding: 4px 0;
  display: flex; align-items: center; gap: 4px;
}
.open-btn:active { opacity: 0.6; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; display: none; flex-direction: column; align-items: center; gap: 12px; }
.empty.show { display: flex; }
.empty-icon { font-size: 40px; opacity: 0.2; }
.empty-text { color: var(--muted); font-size: 13px; line-height: 1.6; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 8px;
  font-size: 12px; z-index: 99; transition: transform 0.3s ease;
  white-space: nowrap; font-family: 'DM Mono', monospace;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-icon">⚡</div>
  <div class="loader-title">Tender Agent · AI</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo">⚡</div>
    <div>
      <div class="logo-text">Tender Agent</div>
      <div class="logo-sub">AI · powered</div>
    </div>
  </div>
  <div class="header-right">
    <div class="time-badge" id="timeBadge"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshTenders()">↻</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="sTotal">—</div><div class="stat-label">Всего</div></div>
  <div class="stat"><div class="stat-num" id="sHigh">—</div><div class="stat-label">≥70%</div></div>
  <div class="stat"><div class="stat-num" id="sSubmit">—</div><div class="stat-label">Подать</div></div>
  <div class="stat"><div class="stat-num" id="sAvg">—</div><div class="stat-label">Ср.балл</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
  <button class="filter-btn" onclick="setFilter('high',this)">Топ ≥70%</button>
  <button class="filter-btn" onclick="setFilter('submit',this)">Подать</button>
  <button class="filter-btn" onclick="setFilter('consider',this)">Рассмотреть</button>
</div>

<div class="section-info">
  <div class="section-count" id="sectionCount"></div>
</div>

<div class="cards" id="cardsContainer"></div>
<div class="empty" id="emptyState">
  <div class="empty-icon">🔍</div>
  <div class="empty-text">Тендеров не найдено.<br>Нажми ↻ для поиска.</div>
</div>
<div class="toast" id="toast"></div>

<script>
const GET_URL     = 'https://solura.app.n8n.cloud/webhook/get-tenders';
const REFRESH_URL = 'https://solura.app.n8n.cloud/webhook/tender-refresh';

let allTenders = [];
let currentFilter = 'all';

if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

function openLink(url) {
  if (!url) return;
  const full = url.startsWith('http') ? url : 'https://' + url;
  if (window.Telegram?.WebApp?.openLink) {
    Telegram.WebApp.openLink(full);
  } else {
    window.open(full, '_blank');
  }
}

function showToast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function sc(v) { return v >= 70 ? 'high' : v >= 40 ? 'mid' : 'low'; }
function cc(v) { return v >= 70 ? 'var(--green)' : v >= 40 ? 'var(--yellow)' : 'var(--red)'; }

function recBadge(r) {
  if (!r) return '';
  if (r.includes('Подать')) return '<span class="badge badge-submit">✓ Подать заявку</span>';
  if (r.includes('Рассмотреть')) return '<span class="badge badge-consider">◎ Рассмотреть</span>';
  return '<span class="badge badge-skip">✕ Пропустить</span>';
}

function riskBadge(r) {
  if (!r) return '';
  if (r.includes('Низ')) return '<span class="badge badge-risk-low">⚡ Риск: Низкий</span>';
  if (r.includes('Сред')) return '<span class="badge badge-risk-mid">⚡ Риск: Средний</span>';
  return '<span class="badge badge-risk-high">⚡ Риск: Высокий</span>';
}

function profitBadge(p) {
  if (!p) return '';
  if (p.includes('Выс')) return '<span class="badge badge-profit-high">📈 Прибыль: Высокая</span>';
  if (p.includes('Сред')) return '<span class="badge badge-profit-mid">📈 Прибыль: Средняя</span>';
  return '<span class="badge badge-profit-low">📈 Прибыль: Низкая</span>';
}

function criteriaHTML(t) {
  const items = [
    { label: 'Соответствие', val: t.compliance || t.Compliance || 0 },
    { label: 'Финансы',      val: t.financial  || t.Financial  || 0 },
    { label: 'Реализация',   val: t.feasibility|| t.Feasibility|| 0 },
    { label: 'Шанс победы',  val: t.winChance  || t.WinChance  || 0 },
  ];
  if (items.every(i => !i.val)) return '';
  return '<div class="criteria">' + items.map(i => {
    const c = cc(i.val);
    return '<div class="criterion">' +
      '<div class="criterion-header">' +
        '<span class="criterion-name">' + i.label + '</span>' +
        '<span class="criterion-val" style="color:' + c + '">' + i.val + '%</span>' +
      '</div>' +
      '<div class="criterion-track"><div class="criterion-fill" style="width:' + i.val + '%;background:' + c + '"></div></div>' +
    '</div>';
  }).join('') + '</div>';
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('sectionCount');

  let f = [...allTenders];
  if (currentFilter === 'high')    f = f.filter(t => (t.matchPercent||0) >= 70);
  if (currentFilter === 'submit')  f = f.filter(t => (t.recommendation||'').includes('Подать'));
  if (currentFilter === 'consider')f = f.filter(t => (t.recommendation||'').includes('Рассмотреть'));
  f.sort((a,b) => (b.matchPercent||0) - (a.matchPercent||0));

  count.textContent = f.length + ' тендер' + (f.length===1?'':f.length<5?'а':'ов');

  if (!f.length) { container.innerHTML = ''; empty.classList.add('show'); return; }
  empty.classList.remove('show');

  container.innerHTML = f.map((t, i) => {
    const pct = t.matchPercent || 0;
    const s = sc(pct);
    const source = t.source || t.Source || '';
    const why = t.whyParticipate || '';
    const risks = t.risks || '';
    const plan = t.actionPlan || '';
    const reasoning = t.reasoning || t.Reasoning || '';

    return '<div class="card" style="animation-delay:' + (i*0.05) + 's">' +
      '<div class="card-score-bar score-' + s + '"></div>' +
      '<div class="card-body">' +
        '<div class="card-header">' +
          '<div class="card-title-block">' +
            '<div class="card-title">' + (t.title || t.Title || 'Без названия') + '</div>' +
            '<div class="card-org">' + (t.organization || t.Organization || '—') + '</div>' +
          '</div>' +
          '<div class="score-badge ' + s + '">' +
            '<div class="score-num ' + s + '">' + pct + '</div>' +
            '<div class="score-pct">%</div>' +
          '</div>' +
        '</div>' +

        '<div class="card-meta">' +
          (t.budget || t.Budget ? '<span class="meta-pill">💰 ' + (t.budget||t.Budget) + '</span>' : '') +
          (t.deadline || t.Deadline ? '<span class="meta-pill">📅 ' + (t.deadline||t.Deadline) + '</span>' : '') +
        '</div>' +

        '<div class="ai-sections">' +
          (why ? '<div class="ai-section why"><div class="ai-section-label">✓ Почему участвовать</div><div class="ai-section-text">' + why + '</div></div>' : '') +
          (risks ? '<div class="ai-section risk"><div class="ai-section-label">⚠ Риски</div><div class="ai-section-text">' + risks + '</div></div>' : '') +
          (plan ? '<div class="ai-section plan"><div class="ai-section-label">→ План действий</div><div class="ai-section-text">' + plan + '</div></div>' : '') +
          (!why && !risks && !plan && reasoning ? '<div class="ai-section why"><div class="ai-section-label">AI Анализ</div><div class="ai-section-text">' + reasoning + '</div></div>' : '') +
        '</div>' +

        criteriaHTML(t) +

        '<div class="card-footer">' +
          '<div class="badges">' +
            recBadge(t.recommendation || t.Recommendation) +
            riskBadge(t.riskLevel || t.RiskLevel) +
            profitBadge(t.profitPotential || t.ProfitPotential) +
          '</div>' +
          (source ? '<button class="open-btn" onclick="openLink(\'' + (source.startsWith('http') ? source : 'https://' + source) + '\')">🔗 Открыть →</button>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function updateStats(tenders) {
  const total  = tenders.length;
  const high   = tenders.filter(t => (t.matchPercent||0) >= 70).length;
  const submit = tenders.filter(t => (t.recommendation||'').includes('Подать')).length;
  const avg    = total ? Math.round(tenders.reduce((s,t) => s+(t.matchPercent||0), 0) / total) : 0;
  document.getElementById('sTotal').textContent  = total;
  document.getElementById('sHigh').textContent   = high;
  document.getElementById('sSubmit').textContent = submit;
  document.getElementById('sAvg').textContent    = avg + '%';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function setTime() {
  const now = new Date();
  document.getElementById('timebadge') && (document.getElementById('timeBadge').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'));
}

async function loadTenders() {
  try {
    const res = await fetch(GET_URL);
    const data = await res.json();
    const raw = data.tenders || data;
    allTenders = Array.isArray(raw) ? raw.filter(t => t.title && t.title !== 'Без названия' && (t.matchPercent||0) > 0) : [];
    updateStats(allTenders);
    renderCards();
    setTime();
  } catch(e) {
    showToast('Ошибка загрузки');
    document.getElementById('emptyState').classList.add('show');
  } finally {
    setTimeout(() => document.getElementById('loader').classList.add('gone'), 500);
  }
}

async function refreshTenders() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showToast('🔍 Ищем тендеры... (~30 сек)', 35000);
  try {
    const res = await fetch(REFRESH_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await res.json();
    const raw = data.tenders || data;
    const tenders = Array.isArray(raw) ? raw.filter(t => t.title && t.title !== 'Без названия' && (t.matchPercent||0) > 0) : [];
    if (tenders.length > 0) {
      allTenders = tenders;
      updateStats(allTenders);
      renderCards();
      setTime();
      showToast('✅ Найдено ' + tenders.length + ' тендеров');
    } else {
      showToast('Новых тендеров не найдено');
    }
  } catch(e) {
    showToast('Ошибка при обновлении');
  } finally {
    btn.classList.remove('spinning');
  }
}

loadTenders();
</script>
</body>
</html>
