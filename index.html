<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tender Agent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(120,100,255,0.12);
  --text: #e8e8f0;
  --muted: #666680;
  --sub: #9999bb;
  --accent: #7c6bff;
  --accent2: #a78bfa;
  --glow: rgba(124,107,255,0.25);
  --green: #22d3a0;
  --green-bg: rgba(34,211,160,0.08);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.08);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.08);
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 20px;
  transition: opacity 0.4s ease;
}
#loader.gone { opacity: 0; pointer-events: none; }
.loader-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 60px var(--glow); }
.loader-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
.loader-bar { width: 140px; height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.loader-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; animation: fill 1.6s ease-in-out infinite; }
@keyframes fill { 0%{width:0;margin-left:0} 50%{width:70%;margin-left:15%} 100%{width:0;margin-left:100%} }

.header {
  padding: 16px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  background: rgba(8,8,16,0.96);
  backdrop-filter: blur(12px);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 0 20px var(--glow); }
.logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 3px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.last-update { font-size: 10px; color: var(--muted); }
.refresh-btn { width: 34px; height: 34px; border-radius: 9px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
.refresh-btn:active { transform: scale(0.88); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 12px 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; color: var(--accent); }
.stat-label { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; }

.filters { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--sub); font-size: 11px; font-family: 'Space Grotesk', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 14px var(--glow); }

.section-label { padding: 2px 16px 8px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.cards { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 10px; }

/* CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: fadeUp 0.3s ease both; transition: border-color 0.2s; }
.card.expanded { border-color: rgba(120,100,255,0.3); }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

.card-bar { height: 3px; }
.bar-high { background: linear-gradient(90deg, var(--green), transparent); }
.bar-mid  { background: linear-gradient(90deg, var(--yellow), transparent); }
.bar-low  { background: linear-gradient(90deg, var(--red), transparent); }

/* CARD HEADER - always visible, clickable */
.card-header { padding: 13px; cursor: pointer; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); flex: 1; }
.card-right { display: flex; align-items: center; gap: 8px; }

.match-circle { flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid; }
.match-circle.high { border-color: var(--green); background: var(--green-bg); }
.match-circle.mid  { border-color: var(--yellow); background: var(--yellow-bg); }
.match-circle.low  { border-color: var(--red); background: var(--red-bg); }
.match-num { font-family: 'Bebas Neue', sans-serif; font-size: 17px; line-height: 1; }
.match-num.high { color: var(--green); }
.match-num.mid  { color: var(--yellow); }
.match-num.low  { color: var(--red); }
.match-sign { font-size: 8px; color: var(--muted); }

.expand-icon { font-size: 12px; color: var(--muted); transition: transform 0.3s; flex-shrink: 0; }
.card.expanded .expand-icon { transform: rotate(180deg); }

.card-meta-preview { display: flex; flex-wrap: wrap; gap: 5px; }
.meta-tag { font-size: 10px; color: var(--sub); background: var(--surface2); border-radius: 5px; padding: 3px 7px; }

/* CARD BODY - expanded details */
.card-body { 
  max-height: 0; 
  overflow: hidden; 
  transition: max-height 0.4s ease, opacity 0.3s ease;
  opacity: 0;
}
.card.expanded .card-body { 
  max-height: 600px; 
  opacity: 1;
}
.card-body-inner { padding: 0 13px 13px; border-top: 1px solid var(--border); padding-top: 12px; }

/* 4 criteria */
.criteria { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.criterion { background: var(--surface2); border-radius: 8px; padding: 7px 9px; }
.criterion-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.criterion-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.criterion-val { font-size: 11px; font-weight: 700; }
.criterion-bar { height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.criterion-fill { height: 100%; border-radius: 2px; }

/* Reasoning */
.reasoning-block { margin-bottom: 12px; }
.reasoning-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.reasoning-text { font-size: 12px; color: var(--sub); line-height: 1.6; border-left: 2px solid var(--accent); padding-left: 10px; }

/* Bottom badges */
.card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 5px; }
.rec-submit  { background: var(--green-bg); color: var(--green); }
.rec-consider{ background: var(--yellow-bg); color: var(--yellow); }
.rec-skip    { background: var(--red-bg); color: var(--red); }
.risk-low    { background: var(--green-bg); color: var(--green); }
.risk-mid    { background: var(--yellow-bg); color: var(--yellow); }
.risk-high   { background: var(--red-bg); color: var(--red); }
.profit-high { background: var(--blue-bg); color: var(--blue); }
.profit-mid  { background: var(--yellow-bg); color: var(--yellow); }
.profit-low  { background: var(--surface2); color: var(--muted); }

.source-link { font-size: 11px; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 4px; margin-top: 10px; }

.empty { text-align: center; padding: 60px 20px; display: none; flex-direction: column; align-items: center; gap: 12px; }
.empty.show { display: flex; }
.empty-icon { font-size: 44px; opacity: 0.25; }
.empty-text { color: var(--muted); font-size: 13px; line-height: 1.6; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 99; transition: transform 0.3s ease; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">TENDER AGENT</div>
  <div class="loader-sub">АНАЛИЗ ТЕНДЕРОВ · AI</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">TENDER AGENT</div>
  </div>
  <div class="header-right">
    <div class="last-update" id="lastUpdate"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshTenders()">↻</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Всего</div></div>
  <div class="stat-card"><div class="stat-num" id="statHigh">—</div><div class="stat-label">≥80%</div></div>
  <div class="stat-card"><div class="stat-num" id="statSubmit">—</div><div class="stat-label">К подаче</div></div>
  <div class="stat-card"><div class="stat-num" id="statAvg">—</div><div class="stat-label">Ср. score</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
  <button class="filter-btn" onclick="setFilter('high',this)">≥80%</button>
  <button class="filter-btn" onclick="setFilter('submit',this)">Подать</button>
  <button class="filter-btn" onclick="setFilter('consider',this)">Рассмотреть</button>
  <button class="filter-btn" onclick="setFilter('skip',this)">Пропустить</button>
</div>

<div class="section-label" id="sectionLabel"></div>
<div class="cards" id="cardsContainer"></div>
<div class="empty" id="emptyState">
  <div class="empty-icon">🔍</div>
  <div class="empty-text">Тендеров не найдено.<br>Нажми ↻ чтобы запустить поиск.</div>
</div>
<div class="toast" id="toast"></div>

<script>
const GET_URL     = 'https://solura.app.n8n.cloud/webhook/get-tenders';
const REFRESH_URL = 'https://solura.app.n8n.cloud/webhook/tender-refresh';

let allTenders = [];
let currentFilter = 'all';

if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

function showToast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function sc(v) { return v >= 80 ? 'high' : v >= 50 ? 'mid' : 'low'; }
function cc(v) { return v >= 80 ? 'var(--green)' : v >= 50 ? 'var(--yellow)' : 'var(--red)'; }
function recCls(r) { if (!r) return 'rec-skip'; if (r.includes('Подать')) return 'rec-submit'; if (r.includes('Рассмотреть')) return 'rec-consider'; return 'rec-skip'; }
function riskCls(r) { if (!r) return ''; if (r.includes('Низ')) return 'risk-low'; if (r.includes('Сред')) return 'risk-mid'; return 'risk-high'; }
function profCls(p) { if (!p) return ''; if (p.includes('Выс')) return 'profit-high'; if (p.includes('Сред')) return 'profit-mid'; return 'profit-low'; }

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('expanded');
}

function criteriaHTML(t) {
  const items = [
    { label: 'Соответствие', val: t.compliance || t.Compliance },
    { label: 'Финансы',      val: t.financial || t.Financial },
    { label: 'Реализация',   val: t.feasibility || t.Feasibility },
    { label: 'Шанс победы',  val: t.winChance || t.WinChance },
  ];
  if (items.every(i => !i.val)) return '';
  return '<div class="criteria">' + items.map(i => {
    const v = i.val || 0;
    const c = cc(v);
    return '<div class="criterion"><div class="criterion-top"><span class="criterion-label">' + i.label + '</span><span class="criterion-val" style="color:' + c + '">' + v + '%</span></div><div class="criterion-bar"><div class="criterion-fill" style="width:' + v + '%;background:' + c + '"></div></div></div>';
  }).join('') + '</div>';
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('sectionLabel');

  let f = [...allTenders];
  if (currentFilter === 'high')    f = f.filter(t => (t.matchPercent||0) >= 80);
  if (currentFilter === 'submit')  f = f.filter(t => (t.recommendation||'').includes('Подать'));
  if (currentFilter === 'consider')f = f.filter(t => (t.recommendation||'').includes('Рассмотреть'));
  if (currentFilter === 'skip')    f = f.filter(t => (t.recommendation||'').includes('Пропустить'));
  f.sort((a,b) => (b.matchPercent||0) - (a.matchPercent||0));

  const n = f.length;
  label.textContent = n + ' тендер' + (n===1?'':n<5?'а':'ов');

  if (n === 0) { container.innerHTML = ''; empty.classList.add('show'); return; }
  empty.classList.remove('show');

  container.innerHTML = f.map((t, i) => {
    const pct = t.matchPercent || 0;
    const s = sc(pct);
    const idx = i;
    const reasoning = t.reasoning || t.Reasoning || '';
    const rec = t.recommendation || t.Recommendation || '';
    const risk = t.riskLevel || t.RiskLevel || '';
    const profit = t.profitPotential || t.ProfitPotential || '';
    const source = t.source || t.Source || '';
    const org = t.organization || t.Organization || '';
    const budget = t.budget || t.Budget || '';
    const deadline = t.deadline || t.Deadline || '';
    const title = t.title || t.Title || 'Без названия';

    return '<div class="card" id="card-' + idx + '" style="animation-delay:' + (i*0.04) + 's">' +
      '<div class="card-bar bar-' + s + '"></div>' +
      '<div class="card-header" onclick="toggleCard(' + idx + ')">' +
        '<div class="card-top">' +
          '<div class="card-title">' + title + '</div>' +
          '<div class="card-right">' +
            '<div class="match-circle ' + s + '"><div class="match-num ' + s + '">' + pct + '</div><div class="match-sign">%</div></div>' +
            '<div class="expand-icon">▼</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-meta-preview">' +
          (org ? '<span class="meta-tag">🏢 ' + org + '</span>' : '') +
          (budget ? '<span class="meta-tag">💰 ' + budget + '</span>' : '') +
          (deadline ? '<span class="meta-tag">📅 ' + deadline + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-body-inner">' +
          criteriaHTML(t) +
          (reasoning ? '<div class="reasoning-block"><div class="reasoning-label">AI анализ</div><div class="reasoning-text">' + reasoning + '</div></div>' : '') +
          '<div class="card-bottom">' +
            '<div class="badges">' +
              (rec ? '<span class="badge ' + recCls(rec) + '">' + rec + '</span>' : '') +
              (risk ? '<span class="badge ' + riskCls(risk) + '">⚠ ' + risk + ' риск</span>' : '') +
              (profit ? '<span class="badge ' + profCls(profit) + '">📈 ' + profit + '</span>' : '') +
            '</div>' +
          '</div>' +
          (source ? '<a class="source-link" href="' + source + '" target="_blank">🔗 Открыть тендер →</a>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function updateStats(tenders) {
  const total  = tenders.length;
  const high   = tenders.filter(t => (t.matchPercent||0) >= 80).length;
  const submit = tenders.filter(t => (t.recommendation||'').includes('Подать')).length;
  const avg    = total ? Math.round(tenders.reduce((s,t) => s+(t.matchPercent||0), 0) / total) : 0;
  document.getElementById('statTotal').textContent  = total;
  document.getElementById('statHigh').textContent   = high;
  document.getElementById('statSubmit').textContent = submit;
  document.getElementById('statAvg').textContent    = avg + '%';
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function setLastUpdate() {
  const now = new Date();
  document.getElementById('lastUpdate').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

async function loadTenders() {
  try {
    const res = await fetch(GET_URL);
    const data = await res.json();
    const raw = data.tenders || data;
    allTenders = Array.isArray(raw) ? raw : [];
    updateStats(allTenders);
    renderCards();
    setLastUpdate();
  } catch(e) {
    showToast('Ошибка загрузки данных');
    document.getElementById('emptyState').classList.add('show');
  } finally {
    setTimeout(() => document.getElementById('loader').classList.add('gone'), 500);
  }
}

async function refreshTenders() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showToast('🔍 Ищем тендеры... (~30 сек)', 30000);
  try {
    const res = await fetch(REFRESH_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await res.json();
    const raw = data.tenders || data;
    const tenders = Array.isArray(raw) ? raw : [];
    if (tenders.length > 0) {
      allTenders = tenders;
      updateStats(allTenders);
      renderCards();
      setLastUpdate();
      showToast('✅ Найдено ' + tenders.length + ' тендеров');
    } else {
      await loadTenders();
      showToast('✅ Данные обновлены');
    }
  } catch(e) {
    showToast('Ошибка при обновлении');
  } finally {
    btn.classList.remove('spinning');
  }
}

loadTenders();
</script>
</body>
</html>
