<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0a0d16"/>
    </linearGradient>
    <linearGradient id="accS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accSV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgS)"/>

  <g opacity="0.022">
    <line x1="0" y1="160" x2="1080" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1080" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1080" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="640" x2="1080" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1080" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="960" x2="1080" y2="960" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1120" x2="1080" y2="1120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1280" x2="1080" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1440" x2="1080" y2="1440" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1600" x2="1080" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1760" x2="1080" y2="1760" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="1920" stroke="#fff" stroke-width="1"/>
  </g>

  <circle cx="900" cy="300" r="400" fill="rgba(56,189,248,0.09)"/>
  <circle cx="180" cy="1600" r="350" fill="rgba(129,140,248,0.08)"/>
  <circle cx="540" cy="960" r="300" fill="rgba(56,189,248,0.03)"/>

  <rect x="0" y="0" width="6" height="1920" fill="url(#accSV)"/>

  <!-- Logo -->
  <rect x="80" y="100" width="54" height="54" rx="12" fill="url(#accS)"/>
  <text x="107" y="134" text-anchor="middle" dominant-baseline="middle" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="26" fill="#050810">T</text>
  <text x="152" y="120" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="26" fill="#f1f5f9" letter-spacing="-0.5">Tender Agent</text>
  <text x="152" y="148" font-family="'DM Sans',Arial,sans-serif" font-size="18" fill="#94a3b8">by Solura</text>

  <!-- Eyebrow -->
  <rect x="80" y="330" width="32" height="2" fill="#38bdf8"/>
  <text x="124" y="333" font-family="'DM Sans',Arial,sans-serif" font-weight="500" font-size="20" fill="#38bdf8" letter-spacing="3">КАК ЭТО РАБОТАЕТ</text>

  <!-- Headline -->
  <text x="80" y="440" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="80" fill="#f1f5f9" letter-spacing="-2">AI сканирует.</text>
  <text x="80" y="536" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="80" fill="#38bdf8" letter-spacing="-2">Ты решаешь.</text>

  <!-- Divider -->
  <rect x="80" y="620" width="920" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- 01 -->
  <rect x="80" y="670" width="920" height="180" rx="18" fill="rgba(56,189,248,0.05)" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <text x="116" y="746" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="48" fill="rgba(56,189,248,0.22)">01</text>
  <text x="116" y="798" font-family="'Manrope',Arial,sans-serif" font-weight="700" font-size="32" fill="#f1f5f9">Сканирует 6 площадок каждый день</text>
  <text x="116" y="828" font-family="'DM Sans',Arial,sans-serif" font-size="21" fill="rgba(241,245,249,0.45)" font-weight="300">Госзакупки, ADB, World Bank и другие — без ручного поиска</text>

  <!-- 02 -->
  <rect x="80" y="870" width="920" height="180" rx="18" fill="rgba(129,140,248,0.05)" stroke="rgba(129,140,248,0.12)" stroke-width="1"/>
  <text x="116" y="946" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="48" fill="rgba(129,140,248,0.22)">02</text>
  <text x="116" y="998" font-family="'Manrope',Arial,sans-serif" font-weight="700" font-size="32" fill="#f1f5f9">Считает реальный шанс на победу</text>
  <text x="116" y="1028" font-family="'DM Sans',Arial,sans-serif" font-size="21" fill="rgba(241,245,249,0.45)" font-weight="300">Соответствие, финансы, реализация — не просто ключевые слова</text>

  <!-- 03 -->
  <rect x="80" y="1070" width="920" height="180" rx="18" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
  <text x="116" y="1146" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="48" fill="rgba(34,197,94,0.25)">03</text>
  <text x="116" y="1198" font-family="'Manrope',Arial,sans-serif" font-weight="700" font-size="32" fill="#f1f5f9">AI-ассистент собирает профиль в чате</text>
  <text x="116" y="1228" font-family="'DM Sans',Arial,sans-serif" font-size="21" fill="rgba(241,245,249,0.45)" font-weight="300">Просто расскажи о компании — остальное сделает AI</text>

  <!-- Score mockup -->
  <rect x="80" y="1300" width="920" height="200" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="112" y="1332" width="90" height="66" rx="14" fill="rgba(34,197,94,0.14)" stroke="rgba(34,197,94,0.28)" stroke-width="1"/>
  <text x="157" y="1376" text-anchor="middle" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="34" fill="#22c55e">94</text>
  <text x="226" y="1358" font-family="'Manrope',Arial,sans-serif" font-weight="700" font-size="26" fill="#f1f5f9">Тендер на аудиторские услуги</text>
  <text x="226" y="1392" font-family="'DM Sans',Arial,sans-serif" font-size="20" fill="rgba(148,163,184,0.6)">120 000 000 UZS · до 28 июля</text>
  <rect x="226" y="1414" width="140" height="30" rx="8" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="296" y="1434" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-weight="600" font-size="18" fill="#22c55e">Подать заявку</text>

  <text x="540" y="1620" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="26" fill="rgba(241,245,249,0.5)" font-weight="300">Дальше — как попробовать →</text>

  <text x="540" y="1800" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="24" fill="rgba(148,163,184,0.5)">@solura.agency</text>
  <text x="540" y="1834" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="20" fill="rgba(148,163,184,0.35)">Tashkent</text>
</svg>
