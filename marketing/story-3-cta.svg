<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0a0d16"/>
    </linearGradient>
    <linearGradient id="accS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accSV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgS)"/>

  <g opacity="0.022">
    <line x1="0" y1="160" x2="1080" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1080" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1080" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="640" x2="1080" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1080" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="960" x2="1080" y2="960" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1120" x2="1080" y2="1120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1280" x2="1080" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1440" x2="1080" y2="1440" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1600" x2="1080" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1760" x2="1080" y2="1760" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1920" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="1920" stroke="#fff" stroke-width="1"/>
  </g>

  <circle cx="900" cy="300" r="400" fill="rgba(56,189,248,0.1)"/>
  <circle cx="180" cy="1600" r="350" fill="rgba(129,140,248,0.09)"/>
  <circle cx="540" cy="960" r="320" fill="rgba(56,189,248,0.05)"/>

  <rect x="0" y="0" width="6" height="1920" fill="url(#accSV)"/>

  <!-- Logo -->
  <rect x="80" y="100" width="54" height="54" rx="12" fill="url(#accS)"/>
  <text x="107" y="134" text-anchor="middle" dominant-baseline="middle" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="26" fill="#050810">T</text>
  <text x="152" y="120" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="26" fill="#f1f5f9" letter-spacing="-0.5">Tender Agent</text>
  <text x="152" y="148" font-family="'DM Sans',Arial,sans-serif" font-size="18" fill="#94a3b8">by Solura</text>

  <!-- Eyebrow -->
  <rect x="80" y="480" width="32" height="2" fill="#38bdf8"/>
  <text x="124" y="483" font-family="'DM Sans',Arial,sans-serif" font-weight="500" font-size="20" fill="#38bdf8" letter-spacing="3">ЗАКРЫТАЯ БЕТА</text>

  <!-- Headline -->
  <text x="80" y="600" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="100" fill="#f1f5f9" letter-spacing="-3">Beta</text>
  <text x="80" y="706" font-family="'Manrope',Arial,sans-serif" font-weight="800" font-size="100" fill="#38bdf8" letter-spacing="-3">открыта.</text>

  <text x="80" y="800" font-family="'DM Sans',Arial,sans-serif" font-size="30" fill="rgba(241,245,249,0.55)" font-weight="400">Первые компании уже тестируют</text>
  <text x="80" y="842" font-family="'DM Sans',Arial,sans-serif" font-size="30" fill="rgba(241,245,249,0.55)" font-weight="400">Tender Agent в Ташкенте.</text>

  <!-- Divider -->
  <rect x="80" y="920" width="920" height="1" fill="rgba(255,255,255,0.08)"/>

  <text x="80" y="1000" font-family="'DM Sans',Arial,sans-serif" font-size="24" fill="#38bdf8" font-weight="600" letter-spacing="1">ЗАЯВКА НА ДОСТУП</text>
  <text x="80" y="1046" font-family="'DM Sans',Arial,sans-serif" font-size="26" fill="rgba(241,245,249,0.6)" font-weight="300">Напиши в Telegram — подключим твою</text>
  <text x="80" y="1084" font-family="'DM Sans',Arial,sans-serif" font-size="26" fill="rgba(241,245,249,0.6)" font-weight="300">компанию вручную, бесплатно на время беты.</text>

  <!-- CTA Button -->
  <rect x="80" y="1620" width="920" height="94" rx="47" fill="url(#accS)"/>
  <text x="540" y="1678" text-anchor="middle" font-family="'Manrope',Arial,sans-serif" font-weight="700" font-size="34" fill="#050810">Написать в Telegram →</text>

  <text x="540" y="1780" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="24" fill="rgba(148,163,184,0.5)">@solura.agency</text>
  <text x="540" y="1814" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="20" fill="rgba(148,163,184,0.35)">solura.agency@mail.ru · Tashkent</text>
</svg>
